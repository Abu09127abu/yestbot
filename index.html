<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="adsbitvex-verify" content="LwZpJPsNkxDSWKpfzTuDJ8iz">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Banner Ad</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* MAIN CONTAINER */

.banner-wrapper{
    width:100%;
    max-width:970px;
    animation:fadeIn 1s ease;
}

/* TITLE */

.banner-title{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.banner-title h1{
    font-size:42px;
    margin-bottom:10px;
    background:linear-gradient(to right,#22c55e,#06b6d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.banner-title p{
    color:#cbd5e1;
    font-size:18px;
}

/* BANNER BOX */

.banner-box{
    position:relative;
    width:100%;
    border-radius:24px;
    overflow:hidden;
    padding:14px;
    background:linear-gradient(135deg,#111827,#1e293b);
    box-shadow:
        0 15px 40px rgba(0,0,0,0.5),
        0 0 30px rgba(34,197,94,0.15);
    transition:0.4s ease;
}

.banner-box:hover{
    transform:translateY(-6px) scale(1.01);
    box-shadow:
        0 20px 50px rgba(0,0,0,0.6),
        0 0 45px rgba(34,197,94,0.25);
}

/* GLOW EFFECT */

.banner-box::before{
    content:'';
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:linear-gradient(
        45deg,
        transparent,
        rgba(34,197,94,0.08),
        transparent
    );
    animation:rotateGlow 8s linear infinite;
}

/* IFRAME */

.banner-frame{
    position:relative;
    z-index:2;
    width:100%;
    height:90px;
    border:none;
    border-radius:16px;
    background:#0f172a;
    display:block;
}

/* LABEL */

.ad-label{
    position:absolute;
    top:12px;
    right:12px;
    z-index:5;
    background:#22c55e;
    color:white;
    padding:6px 12px;
    border-radius:30px;
    font-size:12px;
    font-weight:bold;
    letter-spacing:1px;
}

/* STATUS */

.status{
    text-align:center;
    color:#94a3b8;
    margin-top:15px;
    font-size:15px;
}

/* ANIMATIONS */

@keyframes rotateGlow{

    0%{
        transform:rotate(0deg);
    }

    100%{
        transform:rotate(360deg);
    }

}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* TABLET */

@media(max-width:768px){

    .banner-title h1{
        font-size:32px;
    }

    .banner-frame{
        height:90px;
    }

}

/* MOBILE */

@media(max-width:480px){

    body{
        padding:12px;
    }

    .banner-title h1{
        font-size:26px;
    }

    .banner-title p{
        font-size:15px;
    }

    .banner-box{
        padding:10px;
        border-radius:18px;
    }

    .banner-frame{
        height:100px;
        border-radius:12px;
    }

}

</style>
</head>
<body>

<div class="banner-wrapper">

    <div class="banner-title">
        <h1>Premium Banner Ads</h1>
        <p>High Performance Responsive Advertisement System</p>
    </div>

    <div class="banner-box">

        <div class="ad-label">
            SPONSORED
        </div>

        <iframe
            src="https://mzedrmdgzuonhulzzssx.supabase.co/functions/v1/banner-serve?banner=4c2b55d2321e"
            class="banner-frame"
            scrolling="no"
            loading="lazy">
        </iframe>

    </div>

    <div class="status" id="status">
        Loading Advertisement...
    </div>

</div>

<script>

// AD STATUS

const frame = document.querySelector('.banner-frame');
const statusText = document.getElementById('status');

frame.onload = () => {

    statusText.innerHTML = "Advertisement Loaded Successfully ✅";

};

// FALLBACK

setTimeout(() => {

    if(statusText.innerHTML === "Loading Advertisement..."){

        statusText.innerHTML = "Ad Server Connected 🚀";

    }

},3000);


// AUTO GLOW EFFECT

const box = document.querySelector('.banner-box');

setInterval(() => {

    box.style.boxShadow =
        "0 20px 50px rgba(0,0,0,0.6), 0 0 50px rgba(6,182,212,0.25)";

    setTimeout(() => {

        box.style.boxShadow =
            "0 15px 40px rgba(0,0,0,0.5), 0 0 30px rgba(34,197,94,0.15)";

    },1000);

},4000);

</script>

</body>
</html>
