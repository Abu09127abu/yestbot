<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>320x50 Mobile Banner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* BANNER WRAP */

.banner-wrap{
    width:320px;
    position:relative;
    animation:fadeIn 1s ease;
}

/* BANNER BOX */

.banner-box{
    width:320px;
    height:50px;
    border-radius:16px;
    overflow:hidden;
    position:relative;
    background:linear-gradient(135deg,#111827,#1e293b);
    box-shadow:
        0 10px 25px rgba(0,0,0,0.45),
        0 0 18px rgba(34,197,94,0.18);
    transition:0.3s ease;
}

.banner-box:hover{
    transform:translateY(-2px) scale(1.01);
    box-shadow:
        0 14px 35px rgba(0,0,0,0.55),
        0 0 25px rgba(6,182,212,0.28);
}

/* GLOW */

.banner-box::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;
    top:-50%;
    left:-50%;
    background:linear-gradient(
        45deg,
        transparent,
        rgba(255,255,255,0.06),
        transparent
    );
    animation:rotateGlow 7s linear infinite;
}

/* IFRAME */

.ad-frame{
    position:relative;
    z-index:2;
    width:320px;
    height:50px;
    border:none;
    display:block;
    background:#0f172a;
}

/* LABEL */

.ad-label{
    position:absolute;
    top:4px;
    right:6px;
    z-index:5;
    background:#22c55e;
    color:white;
    font-size:8px;
    padding:2px 7px;
    border-radius:20px;
    font-weight:bold;
    letter-spacing:1px;
}

/* STATUS */

.status{
    margin-top:12px;
    text-align:center;
    color:#94a3b8;
    font-size:13px;
}

/* ANIMATION */

@keyframes rotateGlow{

    0%{
        transform:rotate(0deg);
    }

    100%{
        transform:rotate(360deg);
    }

}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>
<body>

<div class="banner-wrap">

    <div class="banner-box">

        <div class="ad-label">
            AD
        </div>

        <iframe
            src="https://sdk.adsbitvex.com/functions/v1/banner-serve?banner=83e5ab145c80"
            class="ad-frame"
            scrolling="no"
            loading="lazy">
        </iframe>

    </div>

    <div class="status" id="status">
        Loading Mobile Banner...
    </div>

</div>

<script>

// STATUS

const frame = document.querySelector('.ad-frame');
const status = document.getElementById('status');

frame.onload = () => {

    status.innerHTML = "Banner Loaded Successfully ✅";

};

// FALLBACK

setTimeout(()=>{

    if(status.innerHTML === "Loading Mobile Banner..."){

        status.innerHTML = "Ad Server Connected 🚀";

    }

},3000);


// AUTO GLOW EFFECT

const box = document.querySelector('.banner-box');

setInterval(()=>{

    box.style.boxShadow =
        "0 14px 35px rgba(0,0,0,0.55), 0 0 28px rgba(6,182,212,0.30)";

    setTimeout(()=>{

        box.style.boxShadow =
            "0 10px 25px rgba(0,0,0,0.45), 0 0 18px rgba(34,197,94,0.18)";

    },1000);

},4000);

</script>

</body>
</html>
